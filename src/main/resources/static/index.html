<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resource Monitoring Dashboard</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="dashboard-header">
        <div class="header-content">
            <div class="logo">
                <span class="pulse-indicator"></span>
                <h1>Smart Resource Dashboard</h1>
            </div>
            <div class="connection-status">
                <span id="ws-status" class="status-badge disconnected">Disconnected</span>
            </div>
        </div>
    </header>

    <main class="dashboard-container">

        <!-- Live Metrics Section -->
        <section class="metrics-grid">

            <div class="metric-card">
                <div class="card-header">
                    <h2>CPU Load</h2>
                    <span class="live-tag">LIVE</span>
                </div>
                <div class="chart-container">
                    <canvas id="cpuChart"></canvas>
                </div>
                <div class="metric-footer">
                    <span id="currentCpuTxt" class="current-value">0.00%</span>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-header">
                    <h2>Memory Usage (GB)</h2>
                    <span class="live-tag">LIVE</span>
                </div>
                <div class="chart-container">
                    <canvas id="memoryChart"></canvas>
                </div>
                <div class="metric-footer">
                    <span id="currentMemoryTxt" class="current-value">0.00 GB</span>
                </div>
            </div>

            <div class="metric-card">
                <div class="card-header">
                    <h2>Process / I-O Activity</h2>
                    <span class="live-tag">LIVE</span>
                </div>
                <div class="chart-container">
                    <canvas id="diskChart"></canvas>
                </div>
                <div class="metric-footer">
                    <span id="currentDiskTxt" class="current-value">Reading...</span>
                </div>
            </div>

        </section>

        <!-- Analytics and Data Mining Section -->
        <section class="analytics-section">
            <div class="analytics-header">
                <h2>Historical Analysis & Data Mining Engine</h2>
                <button id="runAnalysisBtn" class="primary-btn">Run AI Analysis</button>
            </div>

            <div class="analytics-results" id="analyticsResults">
                <p class="placeholder-text">Click "Run AI Analysis" to fetch anomalies and warehouse trends.</p>
            </div>
        </section>

    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
